<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>TON Pumps & Dumps</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h1>TON Pumps & Dumps</h1>
      <p class="signature">Artwork by:@DieXnst</p>
    </div>

    <div id="start-screen" class="screen active">
      <h2>Choose Your Token</h2>
      <div class="token-grid">
        <div class="token-option selected" data-token="ton">
          <div class="token-preview">
            <img src="assets/ton.jpeg" alt="TON" />
          </div>
          <span>TON</span>
        </div>
        <div class="token-option" data-token="dogs">
          <div class="token-preview">
            <img src="assets/dogs.jpeg" alt="DOGS" />
          </div>
          <span>DOGS</span>
        </div>
        <div class="token-option" data-token="notcoin">
          <div class="token-preview">
            <img src="assets/notcoin.png" alt="NOTCOIN" />
          </div>
          <span>NOTCOIN</span>
        </div>
        <div class="token-option" data-token="redo">
          <div class="token-preview">
            <img src="assets/redo.webp" alt="REDO" />
          </div>
          <span>REDO</span>
        </div>
        <div class="token-option" data-token="blum">
          <div class="token-preview">
            <img src="assets/blum.jpeg" alt="BLUM" />
          </div>
          <span>BLUM</span>
        </div>
        <div class="token-option" data-token="hamster">
          <div class="token-preview">
            <img src="assets/hmstr.png" alt="HAMSTER" />
          </div>
          <span>HAMSTER</span>
        </div>
      </div>

      <button id="start-game-btn">Start Trading</button>

      <div class="vault-divider">
        <span>YOUR VAULT</span>
      </div>

      <div class="vault-section">
        <div id="badge-display">
          <div class="vault-empty">
            <span class="empty-icon">🫙</span>
            <p>No dogs collected yet.</p>
            <span>Reach square 50 to unlock your first!</span>
          </div>
        </div>
      </div>
    </div>

    <div id="game-screen" class="screen">
      <div class="game-container">
        <div id="board">
          <svg id="lines-overlay"></svg>

          <img id="player" src="assets/ton.jpeg" alt="Player Token" />

          <div id="win-screen">
            <h2>TARGET HIT!</h2>
            <div id="badge-container"></div>
            <p id="win-message"></p>
            <button id="claim-sbt-btn">Claim Winner SBT</button>
            <button id="play-again-btn">Trade Again</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <img class="dice-display" id="dice" src="assets/dice1.png" alt="Dice" />
        <button id="roll-btn">Roll Dice</button>
        <p id="status">Tap roll to start trading!</p>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
